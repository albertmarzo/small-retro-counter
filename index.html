<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="complete-score-element">
                <h3>HOME</h3>
                <div class="scoreboard">
                    <p class="score-number" id="home-score-number">0</p>
                </div>
                <div class="additive-buttons">
                    <button onclick="add_1_home()">+1</button>
                    <button onclick="add_2_home()">+2</button>
                    <button onclick="add_3_home()">+3</button>
                </div>
            </div>
            <div class="complete-score-element">
                <h3>GUEST</h3>
                <div class="scoreboard">
                    <p class="score-number" id="guest-score-number">0</p>
                </div>
                <div class="additive-buttons">
                    <button onclick="add_1_guest()">+1</button>
                    <button onclick="add_2_guest()">+2</button>
                    <button onclick="add_3_guest()">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
